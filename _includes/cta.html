{% assign t = site.data.site[page.lang] %}
<section class="section cta-section" id="contact">
  <div class="container cta-inner">
    <h2>{{ t.cta.title }}</h2>
    <p class="lead">{{ t.cta.subtitle }}</p>
    <div class="cta-actions">
      <a href="{{ site.app_url }}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">{{ t.cta.button }}</a>
      <a href="mailto:{{ site.contact_email }}" class="btn btn-secondary">{{ t.cta.email_label }}: {{ site.contact_email }}</a>
    </div>
  </div>
</section>
